# cargo-deny config — run via `cargo deny check`.
# https://embarkstudios.github.io/cargo-deny/
#
# This file is intentionally permissive on advisories during the alpha
# (we depend on velr 0.2.x which itself is alpha); tighten when 1.0 lands.

[graph]
all-features = true
no-default-features = false

[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
