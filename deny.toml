# cargo-deny config — run via `cargo deny check`.
# https://embarkstudios.github.io/cargo-deny/
#
# This file is intentionally permissive on advisories during the alpha
# (we depend on velr 0.2.x which itself is alpha); tighten when 1.0 lands.

[graph]
all-features = true
no-default-features = false

[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # velr publishes with `license = "non-standard"` in its manifest.
    # The clarify blocks below override it with this LicenseRef
    # placeholder so cargo-deny can validate it. See
    # velr-ai/velr-rust-driver for the actual licence text.
    "LicenseRef-velr-non-standard",
]
confidence-threshold = 0.8

# Override velr's unparseable `license = "non-standard"` with a
# LicenseRef placeholder we control. This documents *that* we accept
# velr's terms; it does not change them.
[[licenses.clarify]]
name = "velr"
expression = "LicenseRef-velr-non-standard"
license-files = []

[[licenses.clarify]]
name = "velr-runtime-linux-aarch64"
expression = "LicenseRef-velr-non-standard"
license-files = []

[[licenses.clarify]]
name = "velr-runtime-linux-x86_64"
expression = "LicenseRef-velr-non-standard"
license-files = []

[[licenses.clarify]]
name = "velr-runtime-macos-universal"
expression = "LicenseRef-velr-non-standard"
license-files = []

[[licenses.clarify]]
name = "velr-runtime-windows-x86_64"
expression = "LicenseRef-velr-non-standard"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
